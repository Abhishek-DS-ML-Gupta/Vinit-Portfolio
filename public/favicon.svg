<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White background -->
  <rect width="100" height="100" fill="#FFFFFF"/>
  
  <!-- 2px border circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Inverted V (Λ shape) - ulta V -->
  <polygon points="50,65 30,30 39,30 50,50 61,30 70,30" fill="#000000"/>
  
  <!-- Dot after inverted V to form "V." -->
  <circle cx="74" cy="67" r="3.5" fill="#000000"/>
</svg>
